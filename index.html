<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kloud-r v1 | Premium Hub</title>
    <style>
        /* CUSTOM UI - Dark Theme */
        body { background: #0b0b0b; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; background: #161616; border-bottom: 2px solid #007bff; }
        h1 { margin: 0; color: #007bff; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px; }
        .card { background: #1c1c1c; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: #007bff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        
        .info { padding: 15px; }
        .play-btn { background: #007bff; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; display: inline-block; font-weight: bold; }
        
        /* NO ADS - Clean Layout */
        .ad-free-tag { font-size: 12px; color: #00ff00; margin-top: 10px; opacity: 0.7; }

        /* FULLSCREEN UI */
        #fullscreen-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body id="main-body">

    <header>
        <h1>Kloud-r Premium</h1>
        <p>Direct Cloudmoon Integration | High Definition</p>
    </header>

    <div class="grid" id="game-grid">
        </div>

    <button id="fullscreen-btn" onclick="toggleFS()">⛶</button>

    <script>
        // FULLSCREEN FUNCTION
        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // DYNAMIC GAME LOADING
        async function loadGames() {
            try {
                const response = await fetch('games.json');
                const games = await response.json();
                const grid = document.getElementById('game-grid');
                grid.innerHTML = '';

                games.forEach(game => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${game.image}" alt="${game.name}">
                            <div class="info">
                                <h3>${game.name}</h3>
                                <a class="play-btn" href="${game.url}" target="_blank">LAUNCH HD</a>
                                <div class="ad-free-tag">✓ Ad-Free Stream</div>
                            </div>
                        </div>`;
                });
            } catch (err) {
                document.getElementById('game-grid').innerHTML = "<p>Update games.json to see your library.</p>";
            }
        }

        loadGames();
    </script>
</body>
</html>
