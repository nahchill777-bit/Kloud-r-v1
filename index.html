<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kloud-r v1 | Pro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { padding: 20px; border-bottom: 2px solid #007bff; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; transition: 0.3s; }
        .card:hover { border-color: #007bff; transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 8px; height: 150px; object-fit: cover; }
        .btn { background: #007bff; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 15px; font-weight: bold; }
        #fs-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px; background: #222; border: 1px solid #444; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header"><h1>Kloud-r Gamehub</h1></div>
    <div class="grid" id="game-grid">Loading Games...</div>
    <button id="fs-btn" onclick="toggleFS()">⛶ Fullscreen</button>

    <script>
        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        async function init() {
            try {
                const res = await fetch('games.json');
                const games = await res.json();
                const grid = document.getElementById('game-grid');
                grid.innerHTML = games.map(g => `
                    <div class="card">
                        <img src="${g.image}">
                        <h3>${g.name}</h3>
                        <a class="btn" href="${g.url}" target="_blank">LAUNCH HD</a>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('game-grid').innerText = "Error: Check games.json formatting."; }
        }
        init();
    </script>
</body>
</html>
