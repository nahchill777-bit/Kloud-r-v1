<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kloud R V1 | Revival</title>
    <style>
        :root { --lavender: #b19cd9; --bg: #050505; --card: #0d0d0f; --radius: 18px; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* LANDING (872.png) */
        #landing-view { display: flex; gap: 40px; width: 90%; max-width: 1000px; }
        .auth-box, .info-box { flex: 1; background: var(--card); padding: 40px; border-radius: var(--radius); border: 1px solid #1a1a1a; }
        .input-field { width: 100%; background: #161618; border: 1px solid #222; padding: 12px; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .sign-in-btn { width: 100%; background: var(--lavender); color: black; font-weight: bold; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }

        /* HUB (873.png) */
        #hub-view { display: none; width: 100%; height: 100%; padding: 40px; flex-direction: column; box-sizing: border-box; }
        .search-pill { background: rgba(177, 156, 217, 0.05); border: 1px solid var(--lavender); border-radius: 50px; padding: 10px 25px; color: var(--lavender); width: fit-content; margin-bottom: 30px; }
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .game-card { aspect-ratio: 1/1; background: var(--card); border-radius: 20px; border: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .game-card:hover { border-color: var(--lavender); }

        /* SETTINGS (874.png) */
        #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .settings-card { background: #0d0d0f; width: 350px; padding: 30px; border-radius: 18px; border: 1px solid #1a1a1a; }
        .setting-row { display: flex; justify-content: space-between; margin-bottom: 20px; color: #888; font-size: 14px; }

        /* ENGINE */
        #engine-view { display: none; width: 100%; height: 100%; position: fixed; inset: 0; background: #000; z-index: 3000; }
        iframe { width: 100%; height: 100%; border: none; }
        .panic-btn { position: fixed; bottom: 20px; right: 20px; background: var(--lavender); border-radius: 50%; width: 45px; height: 45px; border: none; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="auth-box">
            <h2 style="color:var(--lavender)">☁ Kloud R V1</h2>
            <h3>Sign In</h3>
            <input type="text" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="sign-in-btn" onclick="showHub()">Sign In</button>
        </div>
        <div class="info-box">
            <h1>What is Kloud R V1?</h1>
            <p style="color:#888">Kloud was an archived project this is the revival.</p>
            <h1>who was this made by?</h1>
            <p style="color:#888">kiet or @thisgamesuxk</p>
        </div>
    </div>

    <div id="hub-view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="search-pill">Search through games.. (1/1)</div>
            <div style="color:var(--lavender); cursor:pointer; font-size:24px;" onclick="toggleSettings()">⚙</div>
        </div>
        <div class="game-grid">
            <div class="game-card" onclick="launchGame('https://web.cloudmoonapp.com/')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="50" style="filter:invert(1)">
            </div>
            <div class="game-card"></div><div class="game-card"></div><div class="game-card"></div>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="settings-card">
            <div class="setting-row"><span>Streaming Quality</span>
                <select id="quality"><option value="sd">SD</option><option value="hd">Free HD</option></select>
            </div>
            <button class="sign-in-btn" onclick="toggleSettings()">Close</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; width:100%; margin-top:20px; cursor:pointer;">Sign Out</button>
        </div>
    </div>

    <div id="engine-view">
        <iframe id="game-frame" src=""></iframe>
        <button class="panic-btn" onclick="exitGame()">🏠</button>
    </div>

    <script>
        function showHub() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                document.getElementById('landing-view').style.display = 'none';
                document.getElementById('hub-view').style.display = 'flex';
            } else { alert("Enter credentials"); }
        }

        function toggleSettings() {
            const s = document.getElementById('settings-overlay');
            s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
        }

        function launchGame(url) {
            const quality = document.getElementById('quality').value;
            const frame = document.getElementById('game-frame');
            
            document.getElementById('hub-view').style.display = 'none';
            document.getElementById('engine-view').style.display = 'block';

            // THE TEXAS4 BLOB METHOD: Prevents the redirect to cloudmoonapp.com
            const wrapper = `<html><body style="margin:0"><iframe src="${url}" style="width:100vw;height:100vh;border:none;" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-pointer-lock"></iframe></body></html>`;
            const blob = new Blob([wrapper], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
            
            console.log("Booting in " + quality + " mode...");
        }

        function exitGame() {
            document.getElementById('engine-view').style.display = 'none';
            document.getElementById('hub-view').style.display = 'flex';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
