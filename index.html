<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Classroom</title>
    <style>
        :root { --lavender: #b19cd9; --bg: #050505; --card: #0d0d0f; --radius: 18px; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #landing-view { display: flex; gap: 40px; width: 90%; max-width: 1000px; }
        .auth-box, .info-box { flex: 1; background: var(--card); padding: 40px; border-radius: var(--radius); border: 1px solid #1a1a1a; }
        .input-field { width: 100%; background: #161618; border: 1px solid #222; padding: 12px; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .sign-in-btn { width: 100%; background: var(--lavender); color: black; font-weight: bold; padding: 12px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        #hub-view { display: none; width: 100%; height: 100%; padding: 40px; flex-direction: column; box-sizing: border-box; }
        .search-pill { background: rgba(177, 156, 217, 0.05); border: 1px solid var(--lavender); border-radius: 50px; padding: 10px 25px; color: var(--lavender); width: fit-content; }
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 30px; }
        .game-card { aspect-ratio: 1/1; background: var(--card); border-radius: 20px; border: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #engine-view { display: none; width: 100%; height: 100%; position: fixed; inset: 0; background: #000; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="auth-box">
            <h2 style="color:var(--lavender)">☁ Kloud R V1</h2>
            <h3>Sign In</h3>
            <input type="text" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="sign-in-btn" onclick="auth()">Sign In</button>
        </div>
        <div class="info-box">
            <h1>What is Kloud R V1?</h1>
            <p style="color:#888">Revival project by kiet / @thisgamesuxk</p>
        </div>
    </div>

    <div id="hub-view">
        <div class="search-pill">Search through games.. (1/1)</div>
        <div class="game-grid">
            <div class="game-card" onclick="launch('aHR0cHM6Ly93ZWIuY2xvdWRtb29uYXBwLmNvbS8=')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="50" style="filter:invert(1)">
            </div>
        </div>
    </div>

    <div id="engine-view">
        <iframe id="main-frame"></iframe>
        <button style="position:fixed; bottom:20px; right:20px;" onclick="location.reload()">🏠</button>
    </div>

    <script>
        function auth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e && p) {
                document.getElementById('landing-view').style.display = 'none';
                document.getElementById('hub-view').style.display = 'flex';
            }
        }

        function launch(encodedUrl) {
            const url = atob(encodedUrl); // Decodes the link only when clicked
            const frame = document.getElementById('main-frame');
            document.getElementById('hub-view').style.display = 'none';
            document.getElementById('engine-view').style.display = 'block';

            // THE NUCLEAR OPTION: Blob URL + Sandbox
            // This creates a virtual file that has NO TOP LEVEL, so the redirect fails.
            const content = `<html><body style="margin:0;background:#000;"><iframe src="${url}" style="width:100vw;height:100vh;border:none;" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-pointer-lock"></iframe></body></html>`;
            const blob = new Blob([content], {type: 'text/html'});
            frame.src = URL.createObjectURL(blob);
        }
    </script>
</body>
</html>
